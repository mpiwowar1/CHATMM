<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#050d05"/>
    </radialGradient>

    <!-- Green glow gradient for bubble -->
    <radialGradient id="bubbleGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0d6b2e"/>
    </radialGradient>

    <!-- Inner glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00ff6620" flood-opacity="0.7"/>
    </filter>

    <!-- Green outer glow on bubble -->
    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded square -->
    <clipPath id="roundedSquare">
      <rect x="20" y="20" width="360" height="360" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture lines -->
  <g opacity="0.04" stroke="#22c55e" stroke-width="1">
    <line x1="20" y1="100" x2="380" y2="100"/>
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="20" y1="300" x2="380" y2="300"/>
    <line x1="100" y1="20" x2="100" y2="380"/>
    <line x1="200" y1="20" x2="200" y2="380"/>
    <line x1="300" y1="20" x2="300" y2="380"/>
  </g>

  <!-- Border glow ring -->
  <rect x="20" y="20" width="360" height="360" rx="80" ry="80"
        fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.25"/>

  <!-- Main chat bubble -->
  <g filter="url(#greenGlow)">
    <path d="M 200 95
             C 130 95 75 140 75 196
             C 75 230 95 260 127 279
             L 115 320
             L 162 296
             C 174 299 187 300 200 300
             C 270 300 325 255 325 196
             C 325 140 270 95 200 95 Z"
          fill="url(#bubbleGrad)"
          stroke="#4ade80"
          stroke-width="2"
          opacity="0.97"/>
  </g>

  <!-- Highlight shine on bubble -->
  <path d="M 145 115 Q 200 100 255 115 Q 230 108 200 107 Q 170 106 145 115 Z"
        fill="white" opacity="0.15"/>

  <!-- "MM" text inside bubble -->
  <text x="200" y="222"
        font-family="'Courier New', monospace"
        font-size="82"
        font-weight="900"
        fill="#050d05"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-4">MM</text>

  <!-- Subtle "MM" highlight -->
  <text x="200" y="219"
        font-family="'Courier New', monospace"
        font-size="82"
        font-weight="900"
        fill="#4ade80"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-4"
        opacity="0.12">MM</text>

  <!-- CHAT label at bottom -->
  <text x="200" y="355"
        font-family="'Courier New', monospace"
        font-size="22"
        font-weight="700"
        fill="#22c55e"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="10"
        opacity="0.9">CHAT</text>

  <!-- Three dot "typing" indicator dots -->
  <circle cx="168" cy="198" r="7" fill="#050d05" opacity="0.55"/>
  <circle cx="200" cy="198" r="7" fill="#050d05" opacity="0.55"/>
  <circle cx="232" cy="198" r="7" fill="#050d05" opacity="0.55"/>

  <!-- Small encryption lock icon - top right of bubble -->
  <g transform="translate(278, 118)" opacity="0.85">
    <rect x="-10" y="4" width="20" height="16" rx="3" fill="#050d05" stroke="#4ade80" stroke-width="1.5"/>
    <path d="M -6 4 Q -6 -4 0 -4 Q 6 -4 6 4"
          fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="12" r="2.5" fill="#4ade80"/>
  </g>
</svg>